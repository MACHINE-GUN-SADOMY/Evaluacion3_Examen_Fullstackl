spring:
  application:
    name: Evaluacio_Final_Fullstackl
    group: cl.crparrah.hohidalgo.evaluacion3_examen
    version: 0.0.1-SNAPSHOT
  datasource:
    url: jdbc:h2:file:./Data_Base/evaluacion_final;DB_CLOSE_ON_EXIT=FALSE
    username: root
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
    enabled: true
    path: /h2-console
    settings:
    web-allow-others: true
  jpa:
    properties:
    hibernate:
    enable_lazy_load_no_trans: true
    use_sql_comments: false
    format_sql: false
    hbm2ddl:
    auto: update # Hibernate creara/actualizara las tablas autom?ticamente
    dialect: org.hibernate.dialect.H2Dialect
    show_sql: true # Para ver las consultas SQL que Hibernate genera

# Para entrar a la DB : http://localhost:8080/h2-console